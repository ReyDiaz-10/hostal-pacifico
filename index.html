<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostal Pacífico Encanto</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #9eb196 !important; /* VERDE SAGE */
            color: #433428 !important; /* CAFÉ OSCURO */
            font-family: 'Arial Black', Gadget, sans-serif;
            text-align: center;
        }

        /* HEADER: TÍTULO CON RELIEVE Y SOMBRAS */
        .header-section { padding: 50px 10px; }

        .letra-p-gigante {
            font-size: 160px;
            font-family: 'Times New Roman', Times, serif;
            display: block;
            line-height: 0.5;
            margin-bottom: 20px;
            color: #433428;
            text-shadow: 4px 4px 0px #86967f, 8px 8px 15px rgba(0,0,0,0.2);
        }

        .titulo-hostal {
            font-size: 55px;
            font-weight: 900;
            letter-spacing: -2px;
            color: #433428;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1), 6px 6px 12px rgba(0,0,0,0.2);
        }

        /* CONTENEDOR CENTRAL MENTA */
        .bloque-central {
            background-color: #c5e1d4 !important; /* VERDE MENTA PASTEL */
            margin: 20px 5%;
            padding: 50px 20px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* SLIDER */
        .slider-container {
            width: 100%;
            max-width: 850px;
            height: 450px;
            margin: 0 auto 40px;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .slide {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; left: 0; top: 0;
            opacity: 0; transition: opacity 2s ease-in-out;
        }
        .slide.active { opacity: 1; }

        /* SERVICIOS */
        .servicios-layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .item-servicio { width: 130px; text-align: center; }

        .item-servicio i {
            font-size: 50px;
            margin-bottom: 15px;
            color: #433428;
            filter: drop-shadow(3px 5px 3px rgba(0,0,0,0.3));
        }

        .item-servicio p { font-size: 16px; font-weight: bold; }

        /* BOTONES FLOTANTES */
        .btn-circular {
            position: fixed;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            z-index: 10000;
        }

        .ws-btn { bottom: 120px; right: 30px; background-color: #25d366; }
        .waze-btn { bottom: 30px; right: 30px; background-color: #33f1ff; }

        /* FOOTER */
        footer { padding: 40px 20px 120px; }

        .boton-airbnb {
            background-color: #ff5a5f;
            color: white;
            padding: 22px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(255, 90, 95, 0.4);
        }

        .texto-direccion {
            font-size: 19px;
            font-weight: bold;
            color: #433428;
            margin-bottom: 30px;
        }

        /* LOS 3 ICONOS SOCIALES */
        .social-icons a {
            font-size: 40px;
            margin: 0 20px;
            color: #433428;
            text-decoration: none;
            transition: transform 0.3s;
            display: inline-block;
        }
        .social-icons a:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <header class="header-section">
        <span class="letra-p-gigante">P</span>
        <h1 class="titulo-hostal">Hostal Pacífico Encanto</h1>
    </header>

    <div class="bloque-central">
        <div class="slider-container">
            <img src="entrada 1.jpg" class="slide-img active">
            <img src="recibidor con muebles.jpg" class="slide-img">
            <img src="baño 1.jpg" class="slide-img">
            <img src="alguna habitación.jpg" class="slide-img">
            <img src="zona de trabajo2.jpg" class="slide-img">
            <img src="comedor cerca a la cocina.jpg" class="slide-img">
            <img src="otro comedor.jpg" class="slide-img">
            <img src="20A990D1-C7A6-4941-8CA7-5699FF7BB345.JPG" class="slide-img">
        </div>

        <h2 style="margin-bottom: 30px;">Nuestros Servicios</h2>
        <div class="servicios-layout">
            <div class="item-servicio"><i class="fas fa-wifi"></i><p>Wifi</p></div>
            <div class="item-servicio"><i class="fas fa-bath"></i><p>Baño</p></div>
            <div class="item-servicio"><i class="fas fa-utensils"></i><p>Cocina</p></div>
            <div class="item-servicio"><i class="fas fa-laptop"></i><p>Oficina</p></div>
            <div class="item-servicio"><i class="fas fa-shield-alt"></i><p>Seguro</p></div>
        </div>
    </div>

    <a href="https://w.app/tmdxwn" class="btn-circular ws-btn"><i class="fab fa-whatsapp"></i></a>
    <a href="https://waze.com/ul/hd3478effp" class="btn-circular waze-btn"><i class="fab fa-waze"></i></a>

    <footer>
        <a href="https://www.airbnb.com.co/users/profile/1470728514452495329" class="boton-airbnb">Reservar en Airbnb</a>
        
        <p class="texto-direccion">
            Encuéntranos en esta dirección:<br>
            📍 Calle 65 #48 - 78, La Candelaria, Medellín
        </p>
        
        <div class="social-icons">
            <a href="https://www.facebook.com/hostalpacificoencanto/" title="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/pacificoencanto/" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.airbnb.com.co/rooms/1413201739688849287" title="Airbnb"><i class="fab fa-airbnb"></i></a>
        </div>

        <p style="margin-top: 35px; font-weight: normal; opacity: 0.8;">Atención: 7am a 10pm</p>
    </footer>

    <script>
        const images = document.querySelectorAll('.slide');
        let current = 0;
        setInterval(() => {
            images[current].classList.remove('active');
            current = (current + 1) % images.length;
            images[current].classList.add('active');
        }, 4000);
    </script>

</body>
</html>
