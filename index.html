<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostal Pacífico Encanto</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* RESET */
        *{margin:0;padding:0;box-sizing:border-box;}

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #9eb196 !important; 
            text-align: center;
            color: #433428;
            overflow-x: hidden;
        }

        /* HEADER CON IMAGEN */
        .header {
            padding: 40px 20px 10px;
        }

        .logo-img {
            width: 280px; /* Ajusta el tamaño según tu preferencia */
            max-width: 80%;
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(4px 4px 10px rgba(0,0,0,0.2));
        }

        .titulo-principal {
            font-size: 45px;
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1), 5px 5px 12px rgba(0,0,0,0.2);
        }

        /* GALERIA / SLIDER RE-ACTIVADO */
        .slider-box {
            width: 90%;
            max-width: 850px;
            height: 450px;
            margin: 20px auto;
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            background: #eee;
        }

        .slider-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            display: block;
        }

        .slider-box img.active {
            opacity: 1;
            z-index: 1;
        }

        /* SERVICIOS */
        .servicios {
            background: #c5e1d4 !important; 
            margin: 20px;
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .item { width: 115px; }
        .item i {
            font-size: 40px;
            margin-bottom: 10px;
            color: #433428;
            filter: drop-shadow(3px 4px 3px rgba(0,0,0,0.2));
        }
        .item p { font-weight: bold; font-size: 14px; }
        .item small { font-size: 11px; opacity: 0.8; }

        /* BOTONES Y DIRECCION */
        .btn-airbnb {
            display: inline-block;
            margin: 20px;
            background: #ff5a5f;
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 90, 95, 0.4);
        }

        .direccion {
            font-size: 17px;
            font-weight: bold;
            margin: 20px 0;
            padding: 0 20px;
        }

        .social-bar { margin-bottom: 110px; }
        .social-bar a {
            font-size: 35px;
            margin: 0 15px;
            color: #433428;
            text-decoration: none;
        }

        /* BOTONES FLOTANTES */
        .btn-flotante {
            position: fixed;
            right: 25px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            z-index: 1000;
        }

        .whatsapp { bottom: 110px; background: #25d366; }
        .waze { bottom: 30px; background: #33f1ff; color: #000; }

    </style>
</head>

<body>

<div class="header">
    <img src="logo.png" alt="Logo Hostal Pacífico Encanto" class="logo-img">
    <h1 class="titulo-principal">Hostal Pacífico Encanto</h1>
</div>

<div class="slider-box" id="slider">
    <img src="entrada 1.jpg" class="active">
    <img src="recibidor con muebles.jpg">
    <img src="baño 1.jpg">
    <img src="alguna habitación.jpg">
    <img src="zona de trabajo2.jpg">
    <img src="comedor cerca a la cocina.jpg">
    <img src="otro comedor.jpg">
    <img src="20A990D1-C7A6-4941-8CA7-5699FF7BB345.JPG">
</div>

<div class="servicios">
    <h2 style="margin-bottom:25px;">Nuestros Servicios</h2>
    <div class="grid">
        <div class="item"><i class="fas fa-wifi"></i><p>Wifi</p><small>Conexión rápida</small></div>
        <div class="item"><i class="fas fa-bath"></i><p>Baño</p><small>Ducha tropical</small></div>
        <div class="item"><i class="fas fa-utensils"></i><p>Cocina</p><small>Uso comunal</small></div>
        <div class="item"><i class="fas fa-laptop"></i><p>Trabajo</p><small>Zona cómoda</small></div>
        <div class="item"><i class="fas fa-shield-alt"></i><p>Seguridad</p><small>Cámaras activas</small></div>
        <div class="item"><i class="fas fa-tv"></i><p>TV</p><small>Zonas comunes</small></div>
    </div>
</div>

<a href="https://www.airbnb.com.co/users/profile/1470728514452495329" class="btn-airbnb">Reservar en Airbnb</a>

<div class="direccion">
    📍 Calle 65 #48 - 78, La Candelaria, Medellín
</div>

<div class="social-bar">
    <a href="https://www.facebook.com/hostalpacificoencanto/"><i class="fab fa-facebook"></i></a>
    <a href="https://www.instagram.com/pacificoencanto/"><i class="fab fa-instagram"></i></a>
    <a href="https://www.airbnb.com.co/rooms/1413201739688849287"><i class="fab fa-airbnb"></i></a>
</div>

<a href="https://w.app/tmdxwn" class="btn-flotante whatsapp"><i class="fab fa-whatsapp"></i></a>
<a href="https://waze.com/ul/hd3478effp" class="btn-flotante waze"><i class="fab fa-waze"></i></a>

<script>
    window.onload = function() {
        const images = document.querySelectorAll('#slider img');
        let current = 0;
        
        if (images.length > 0) {
            setInterval(() => {
                images[current].classList.remove('active');
                current = (current + 1) % images.length;
                images[current].classList.add('active');
            }, 4000); // Cambia cada 4 segundos
        }
    };
</script>

</body>
</html>
