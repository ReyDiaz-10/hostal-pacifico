<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostal Pacífico Encanto</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#9eb196,#c5e1d4);
    text-align:center;
    color:#5a3b2e;
}

/* HEADER */
.header{
    padding:50px 20px 20px;
}

.logo{
    width:140px;
    margin-bottom:10px;
}

.titulo-img{
    width:320px;
    max-width:90%;
}

/* GALERIA */
.galeria{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:20px;
    overflow-x:auto;
}

.galeria img{
    width:140px;
    height:220px;
    object-fit:cover;
    border-radius:15px;
}

/* SERVICIOS */
.servicios{
    background:#c5e1d4;
    margin:20px;
    padding:30px;
    border-radius:30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.servicios h2{
    font-size:28px;
    margin-bottom:20px;
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.item{
    width:110px;
}

.item i{
    font-size:35px;
    margin-bottom:8px;
}

.item p{
    font-weight:bold;
}

.item small{
    font-size:12px;
    opacity:0.7;
}

/* BOTON */
.btn-airbnb{
    display:inline-block;
    margin:30px;
    background:#ff5a5f;
    color:white;
    padding:15px 35px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

/* DIRECCION */
.direccion{
    font-size:18px;
    margin-bottom:40px;
}

/* BOTONES FLOTANTES */
.btn{
    position:fixed;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:white;
}

.whatsapp{bottom:100px;background:#25d366;}
.waze{bottom:30px;background:#33f1ff;color:black;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="images/logo.png" class="logo">
    <img src="images/logo.png" class="titulo-img">
</div>

<!-- GALERIA -->
<div class="galeria">
            <img src="entrada 1.jpg" class="slide-img active">
            <img src="recibidor con muebles.jpg" class="slide-img">
            <img src="baño 1.jpg" class="slide-img">
            <img src="alguna habitación.jpg" class="slide-img">
            <img src="zona de trabajo2.jpg" class="slide-img">
            <img src="comedor cerca a la cocina.jpg" class="slide-img">
            <img src="otro comedor.jpg" class="slide-img">
            <img src="20A990D1-C7A6-4941-8CA7-5699FF7BB345.JPG" class="slide-img">
</div>

<!-- SERVICIOS -->
<div class="servicios">
    <h2>Nuestros Servicios</h2>

    <div class="grid">

        <div class="item">
            <i class="fas fa-wifi"></i>
            <p>wifi</p>
            <small>Conexión rápida</small>
        </div>

        <div class="item">
            <i class="fas fa-bath"></i>
            <p>baño</p>
            <small>Ducha tropical</small>
        </div>

        <div class="item">
            <i class="fas fa-utensils"></i>
            <p>cocina</p>
            <small>Uso comunal</small>
        </div>

        <div class="item">
            <i class="fas fa-laptop"></i>
            <p>trabajo</p>
            <small>Zona cómoda</small>
        </div>

        <div class="item">
            <i class="fas fa-shield-alt"></i>
            <p>seguridad</p>
            <small>Cámaras activas</small>
        </div>

        <div class="item">
            <i class="fas fa-tv"></i>
            <p>tv</p>
            <small>Zonas comunes</small>
        </div>

    </div>
</div>

<!-- BOTON -->
<a href="#" class="btn-airbnb">Reservar en Airbnb</a>

<!-- DIRECCION -->
<div class="direccion">
📍 Calle 65 #48 - 78, La Candelaria, Medellín
</div>

<!-- BOTONES -->
<a href="#" class="btn whatsapp"><i class="fab fa-whatsapp"></i></a>
<a href="#" class="btn waze"><i class="fab fa-waze"></i></a>

</body>
</html>
