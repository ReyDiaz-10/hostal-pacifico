<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostal Pacífico Encanto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* RESET Y FONDO BASE */
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #9eb196; /* Verde Sage */
            color: #433428;
            overflow-x: hidden;
            text-align: center;
        }

        /* DECORACIÓN PACÍFICO LATERAL */
        .decoracion-fondo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            font-size: 25px; opacity: 0.2;
            display: flex; flex-wrap: wrap; justify-content: space-around;
            padding: 20px;
        }

        /* HEADER INTEGRADO */
        .header {
            padding: 30px 0;
            background-color: #9eb196;
        }
        .logo-img {
            max-width: 320px;
            width: 80%;
            height: auto;
            border: none;
            display: inline-block;
        }

        /* CONTENEDOR CENTRAL: CONTRASTE PASTEL */
        .panel-central {
            background-color: #fdf5e6; /* Crema Pastel para contraste */
            margin: 20px auto;
            padding: 40px 20px;
            width: 90%;
            max-width: 900px;
            border-radius: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* SLIDER */
        .slider-box {
            width: 100%;
            max-width: 750px;
            height: 400px;
            margin: 0 auto 30px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .slider-box img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; left: 0; top: 0;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        .slider-box img.active { opacity: 1; z-index: 1; }

        /* SERVICIOS CON ICONOS DE COLORES */
        .servicios-grid {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; margin-bottom: 20px;
        }
        .item { width: 100px; }
        .item i { font-size: 40px; margin-bottom: 8px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1)); }
        
        /* Colores llamativos para servicios */
        .item:nth-child(1) i { color: #00bcd4; } /* Wifi */
        .item:nth-child(2) i { color: #4caf50; } /* Baño */
        .item:nth-child(3) i { color: #ff5722; } /* Cocina */
        .item:nth-child(4) i { color: #fbc02d; } /* Trabajo */
        .item:nth-child(5) i { color: #3f51b5; } /* Seguro */
        .item:nth-child(6) i { color: #e91e63; } /* TV */

        .item p { font-size: 13px; font-weight: bold; }

        /* ARGUMENTOS Y BLOQUE INFERIOR CENTRADO */
        .bloque-final {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .argumento-airbnb {
            font-size: 15px;
            max-width: 500px;
            margin: 0 auto 10px;
            font-weight: normal;
        }

        .btn-airbnb {
            background-color: #ff5a5f;
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 90, 95, 0.3);
            margin-bottom: 10px;
        }

        .info-texto { font-size: 16px; font-weight: bold; margin: 5px 0; }
        
        .social-bar { margin: 25px 0 100px; }
        .social-bar a { font-size: 35px; margin: 0 15px; color: #433428; text-decoration: none; }

        /* BOTONES FLOTANTES */
        .btn-flotante {
            position: fixed; right: 20px; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000;
        }
        .whatsapp { bottom: 100px; background: #25d366; }
        .waze { bottom: 30px; background: #33f1ff; color: #000; }
    </style>
</head>
<body>

    <div class="decoracion-fondo">
        🌴 🐟 🌊 💃 🎷 🎹 🌴 🐟 🌊 🕺 🎷 🥁
    </div>

    <div class="header">
        <img src="logo.png" alt="Hostal Pacífico Encanto" class="logo-img">
    </div>

    <div class="panel-central">
        
        <div class="slider-box" id="slider">
            <img src="entrada 1.jpg" class="active">
            <img src="recibidor con muebles.jpg">
            <img src="baño 1.jpg">
            <img src="alguna habitación.jpg">
            <img src="zona de trabajo2.jpg">
            <img src="comedor cerca a la cocina.jpg">
            <img src="otro comedor.jpg">
            <img src="20A990D1-C7A6-4941-8CA7-5699FF7BB345.JPG">
        </div>

        <h3>Nuestros Servicios</h3>
        <br>
        <div class="servicios-grid">
            <div class="item"><i class="fas fa-wifi"></i><p>Wifi</p></div>
            <div class="item"><i class="fas fa-bath"></i><p>Baño</p></div>
            <div class="item"><i class="fas fa-utensils"></i><p>Cocina</p></div>
            <div class="item"><i class="fas fa-laptop"></i><p>Trabajo</p></div>
            <div class="item"><i class="fas fa-shield-alt"></i><p>Seguro</p></div>
            <div class="item"><i class="fas fa-tv"></i><p>TV</p></div>
        </div>

        <div class="bloque-final">
            <p class="argumento-airbnb">Para tu seguridad y confianza, gestionamos todas nuestras reservas a través de Airbnb.</p>
            
            <a href="https://www.airbnb.com.co/users/profile/1470728514452495329" class="btn-airbnb">Reservar en Airbnb</a>

            <p class="info-texto">🕒 Horario de atención: 7:00 AM - 10:00 PM</p>
            <p class="info-texto">📍 Calle 65 #48 - 78, La Candelaria, Medellín</p>

            <div class="social-bar">
                <a href="https://www.facebook.com/hostalpacificoencanto/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/pacificoencanto/"><i class="fab fa-instagram"></i></a>
                <a href="https://www.airbnb.com.co/rooms/1413201739688849287"><i class="fab fa-airbnb"></i></a>
            </div>
        </div>
    </div>

    <a href="https://w.app/tmdxwn" class="btn-flotante whatsapp"><i class="fab fa-whatsapp"></i></a>
    <a href="https://waze.com/ul/hd3478effp" class="btn-flotante waze"><i class="fab fa-waze"></i></a>

    <script>
        // SCRIPT DEL SLIDER
        window.onload = function() {
            const images = document.querySelectorAll('#slider img');
            let current = 0;
            if (images.length > 0) {
                setInterval(() => {
                    images[current].classList.remove('active');
                    current = (current + 1) % images.length;
                    images[current].classList.add('active');
                }, 4000);
            }
        };
    </script>
</body>
</html>
